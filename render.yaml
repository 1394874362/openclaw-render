services:
  - type: web
    name: openclaw
    runtime: docker
    plan: standard
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
      # Primary AI providers (set at least one)
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Additional providers (optional)
      - key: OPENROUTER_API_KEY
        sync: false
      - key: MOONSHOT_API_KEY
        sync: false
      - key: MINIMAX_API_KEY
        sync: false
      # Custom CPA provider bootstrap (optional)
      - key: CPA_BASE_URL
        sync: false
      - key: CPA_API_KEY
        sync: false
      - key: CPA_API_KEYS
        sync: false
      - key: CPA_API
        sync: false
      - key: CPA_MODELS
        sync: false
      - key: CPA_DEFAULT_MODEL
        sync: false
      - key: CPA_MODEL_FALLBACKS
        sync: false
      - key: CPA_IMAGE_MODEL
        sync: false
      - key: CPA_CODER_MODEL
        sync: false
      - key: OPENCLAW_ELEVATED_TELEGRAM_ALLOW_FROM
        sync: false
    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 5
